<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多容器装箱可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f0f0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        /* 输入框容器样式 */
        .input-container {
            max-width: 800px;
            margin: 0 auto 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .input-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        #jsonInput {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 10px;
        }

        #drawBtn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            background: #409eff;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        #drawBtn:hover {
            background: #66b1ff;
        }

        .container-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
            overflow-y: auto;
            max-height: 70vh;
        }

        .container-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .container-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .container-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .canvas-container {
            position: relative;
            overflow: auto;
        }

        .packing-canvas {
            border: 1px solid #ddd;
            background: white;
        }

        /* 错误提示样式 */
        .error-tip {
            color: #f56c6c;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
<!-- JSON 输入区域 -->
<div class="input-container">
    <div class="input-title">请粘贴 JSON 格式的装箱数据：</div>
    <textarea id="jsonInput" placeholder='示例格式：[{"containerLength":400,"containerWidth":400,"rate":0.06125,"squareList":[...],"placeSquareList":[{"x":1.0,"y":1.0,"l":80.0,"w":60.0},...]}]'></textarea>
    <button id="drawBtn">绘制图形</button>
    <div class="error-tip" id="errorTip">JSON 格式错误，请检查后重新输入！</div>
</div>

<!-- 可视化容器区域 -->
<div class="container-wrapper" id="containerWrapper"></div>

<script>
    // 缩放比例配置
    const MAX_CANVAS_WIDTH = 700;  // Canvas 最大宽度（适应浏览器）
    const DEFAULT_SCALE = 0.8;      // 默认缩放比例

    // 初始化页面
    window.onload = function() {
        // 绑定绘制按钮事件
        document.getElementById('drawBtn').addEventListener('click', handleDraw);

        // 可选：默认填充示例数据到输入框
        const sampleData = [
            {
                "containerLength": 400,
                "containerWidth": 400,
                "rate": 0.06125,
                "squareList": [
                    {
                        "id": "3f33d2a9-3352-46da-b336-3fd2f553953d",
                        "l": 100.0,
                        "w": 50.0
                    },
                    {
                        "id": "db519978-d34e-4d36-927c-5357be8e6963",
                        "l": 80.0,
                        "w": 60.0
                    }
                ],
                "placeSquareList": [
                    {
                        "x": 1.0,
                        "y": 1.0,
                        "l": 80.0,
                        "w": 60.0
                    },
                    {
                        "x": 82.0,
                        "y": 1.0,
                        "l": 100.0,
                        "w": 50.0
                    }
                ]
            }
        ];
        document.getElementById('jsonInput').value = JSON.stringify(sampleData, null, 2);
    };

    /**
     * 处理绘制按钮点击事件
     */
    function handleDraw() {
        const jsonInput = document.getElementById('jsonInput');
        const errorTip = document.getElementById('errorTip');
        const wrapper = document.getElementById('containerWrapper');

        // 清空之前的绘制内容和错误提示
        wrapper.innerHTML = '';
        errorTip.style.display = 'none';

        try {
            // 解析 JSON 数据
            const jsonData = JSON.parse(jsonInput.value.trim());

            // 验证数据格式（至少是数组）
            if (!Array.isArray(jsonData)) {
                throw new Error('数据必须是数组格式');
            }

            // 渲染所有容器的可视化内容
            renderAllContainers(jsonData);
        } catch (error) {
            // 显示错误提示
            errorTip.style.display = 'block';
            console.error('JSON 解析失败：', error);
        }
    }

    /**
     * 计算合适的缩放比例
     * @param {number} containerLength 容器长度
     * @return {number} 缩放比例
     */
    function calculateScale(containerLength) {
        const baseWidth = MAX_CANVAS_WIDTH - 40; // 减去边距
        if (containerLength > baseWidth) {
            return baseWidth / containerLength;
        }
        return DEFAULT_SCALE;
    }

    /**
     * 渲染所有容器的可视化内容（支持动态容器尺寸和缩放）
     * @param {Array} solutions 解析后的装箱数据数组
     */
    function renderAllContainers(solutions) {
        const wrapper = document.getElementById('containerWrapper');

        solutions.forEach((solution, index) => {
            // 跳过没有 placeSquareList 的无效数据
            if (!solution.placeSquareList || !Array.isArray(solution.placeSquareList)) {
                return;
            }

            // 获取容器尺寸（支持新旧两种格式）
            const containerLength = solution.containerLength || (solution.instance && solution.instance.l) || 400;
            const containerWidth = solution.containerWidth || (solution.instance && solution.instance.w) || 400;

            // 计算缩放比例
            const scale = calculateScale(containerLength);
            const scaledLength = containerLength * scale;
            const scaledWidth = containerWidth * scale;

            // 创建容器卡片
            const containerCard = document.createElement('div');
            containerCard.className = 'container-card';

            // 创建容器标题（显示利用率和尺寸）
            const title = document.createElement('div');
            title.className = 'container-title';
            const rate = solution.rate || 0;
            title.innerText = `容器 ${index + 1} (利用率：${(rate * 100).toFixed(2)}%)`;

            // 创建容器尺寸信息
            const info = document.createElement('div');
            info.className = 'container-info';
            info.innerText = `容器尺寸：${containerLength} × ${containerWidth} (缩放比例：${(scale * 100).toFixed(0)}%)`;

            // 创建 Canvas 容器
            const canvasContainer = document.createElement('div');
            canvasContainer.className = 'canvas-container';
            canvasContainer.style.width = `${scaledLength + 20}px`;
            canvasContainer.style.height = `${scaledWidth + 20}px`;

            // 创建 Canvas 元素（根据缩放后的尺寸设置）
            const canvas = document.createElement('canvas');
            canvas.className = 'packing-canvas';
            canvas.width = scaledLength + 20;
            canvas.height = scaledWidth + 20;

            // 绘制容器边框 + 所有矩形（使用缩放后的尺寸）
            drawContainerBorder(canvas, scaledLength, scaledWidth);
            drawAllSquares(canvas, solution.placeSquareList, scale);

            // 组装 DOM
            canvasContainer.appendChild(canvas);
            containerCard.appendChild(title);
            containerCard.appendChild(info);
            containerCard.appendChild(canvasContainer);
            wrapper.appendChild(containerCard);
        });
    }

    /**
     * 绘制容器边框（支持动态尺寸和缩放）
     * @param {HTMLCanvasElement} canvas Canvas 元素
     * @param {number} length 容器长度（已缩放）
     * @param {number} width 容器宽度（已缩放）
     */
    function drawContainerBorder(canvas, length, width) {
        const ctx = canvas.getContext('2d');
        // 清空画布
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 绘制容器边框（动态尺寸，留 10px 边距）
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 10, length, width);
    }

    /**
     * 绘制所有矩形（支持缩放）
     * @param {HTMLCanvasElement} canvas Canvas 元素
     * @param {Array} placeSquareList 已放置的矩形列表
     * @param {number} scale 缩放比例
     */
    function drawAllSquares(canvas, placeSquareList, scale) {
        placeSquareList.forEach(square => {
            // 偏移 10px 边距，和容器边框对齐，并应用缩放
            const x = (square.x || 0) * scale + 10;
            const y = (square.y || 0) * scale + 10;
            const l = (square.l || 0) * scale;
            const w = (square.w || 0) * scale;

            // 绘制单个矩形
            drawSquare(canvas, x, y, l, w);
        });
    }

    /**
     * 绘制单个矩形（模拟 Java 中的 draw 方法）
     * @param {HTMLCanvasElement} canvas Canvas 元素
     * @param {number} x 矩形 X 坐标
     * @param {number} y 矩形 Y 坐标
     * @param {number} l 矩形长度
     * @param {number} w 矩形宽度
     */
    function drawSquare(canvas, x, y, l, w) {
        const ctx = canvas.getContext('2d');

        // 绘制矩形边框（黑色）
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, l, w);

        // 根据宽度计算颜色：使用 HSL 色彩空间，宽度越大色相值越小（偏红），宽度越小色相值越大（偏蓝紫）
        const hue = 240 - (w / 100) * 240; // 动态计算色相
        const fillColor = `hsla(${hue}, 70%, 50%, 0.6)`;

        ctx.fillStyle = fillColor;
        ctx.fillRect(x, y, l, w);
    }
</script>
</body>
</html>
